      </a>
      <div class="post-abstract">
        <p>如果一定要为这篇文章命个名，我想一定不会是《美利坚游记》，如此浮夸，如此直白，如此泛泛，完全不是我的行文风格。</p>
<p>可是当我想为它取题时，脑中第一浮现出的，是《欧陆游记》这个名字。啊，“欧陆”，充满诗意，饱含浪漫；可惜我现在游的是美国，总不能叫美陆，东施效颦一效，不如称之为“美利坚游记”。</p>
